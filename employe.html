<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropical Heights - Espace Employé</title>
    <style>
        body {
            background-color: #0b131a;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #f5f6fa;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background: #121f2b;
            border: 1px solid #1f3141;
            border-radius: 10px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
        }
        h1 {
            color: #00ffcc;
            text-align: center;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .sub {
            text-align: center;
            color: #a5b1c2;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #00ffcc;
            font-size: 14px;
            font-weight: bold;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            background: #09121a;
            border: 1px solid #22374a;
            border-radius: 6px;
            color: #ffffff;
            font-size: 15px;
            box-sizing: border-box;
        }
        .form-control:focus {
            outline: none;
            border-color: #00ffcc;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #00ffcc 0%, #00e6b8 100%);
            color: #09121a;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
        }
        .footer-links {
            margin-top: 25px;
            text-align: center;
        }
        .btn-link {
            color: #a5b1c2;
            text-decoration: none;
            font-size: 14px;
        }
        .btn-link:hover {
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tropical Heights</h1>
        <div class="sub">Espace Employé — Enregistrement des Ventes</div>

        <form id="saleForm">
            <div class="form-group">
                <label for="itemSelect">Article vendu :</label>
                <select id="itemSelect" class="form-control" required>
                    <option value="500">Entrée Simple (500$)</option>
                    <option value="1500">Entrée VIP (1500$)</option>
                    <option value="200">Cocktail Tropical (200$)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="quantity">Quantité :</label>
                <input type="number" id="quantity" class="form-control" value="1" min="1" required>
            </div>

            <div class="form-group">
                <label>Nom du client (ou ID) :</label>
                <input type="text" class="form-control" placeholder="Ex: Calisma">
            </div>

            <button type="submit" class="btn-submit">Valider la vente</button>
        </form>

        <div class="footer-links">
            <a href="index.html" class="btn-link">Déconnexion / Retour</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
