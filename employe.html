<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropical Heights - Espace Employé</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h2>Tropical Heights</h2>
            <p>Espace Employé — Enregistrement des Ventes</p>
        </header>

        <section class="form-section">
            <h3>Nouvelle Vente</h3>
            <form id="saleForm">
                <div class="input-group">
                    <label for="item">Article vendu</label>
                    <select id="item" required>
                        <option value="">-- Choisir un article --</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="quantity">Quantité</label>
                    <input type="number" id="quantity" min="1" value="1" required>
                </div>

                <div class="input-group">
                    <label for="client">Nom du client (ou ID)</label>
                    <input type="text" id="client" placeholder="Ex: Jean Paul ou ID 42" required>
                </div>

                <button type="submit">Valider la vente</button>
            </form>
        </section>

        <section class="history-section">
            <h3>Mes ventes du jour</h3>
            <table id="salesTable">
                <thead>
                    <tr>
                        <th>Article</th>
                        <th>Quantité</th>
                        <th>Client</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="salesList">
                    </tbody>
            </table>
        </section>
    </div>

    <script src="script.js"></script>

    <script>
    // Fonction pour charger dynamiquement la carte du Tropical Heights
    function chargerCarteEmploye() {
        const articles = JSON.parse(localStorage.getItem('articles')) || [];
        const select = document.getElementById('item');
        
        select.innerHTML = '<option value="">-- Choisir un article --</option>';

        articles.forEach(article => {
            const option = document.createElement('option');
            option.value = article.nom;
            option.dataset.prix = article.prix; 
            option.textContent = `${article.nom} (${article.prix}$)`;
            select.appendChild(option);
        });
    }

    // Gestion de la validation d'une vente
    document.getElementById('saleForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const select = document.getElementById('item');
        const itemNom = select.value;
        const itemPrix = parseInt(select.options[select.selectedIndex].dataset.prix);
        const quantity = parseInt(document.getElementById('quantity').value);
        const client = document.getElementById('client').value;
        
        const total = itemPrix * quantity;

        // 🔥 CONNEXION AVEC LE PANEL BOSS : Envoie les données !
        if (typeof enregistrerUneVente === "function") {
            enregistrerUneVente(total);
        }

        // Ajouter la ligne dans le tableau des ventes visuel de l'employé
        const salesList = document.getElementById('salesList');
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${itemNom}</td>
            <td>${quantity}</td>
            <td>${client}</td>
            <td style="font-weight: bold; color: #2ecc71;">${total}$</td>
        `;
        salesList.appendChild(row);

        // Réinitialiser le formulaire pour la prochaine vente
        document.getElementById('saleForm').reset();
    });

    // Charger la carte au démarrage
    chargerCarteEmploye();
    </script>
</body>
</html>
