<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Plucker - Espace Commandes Entreprises</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h2>Lucky Plucker</h2>
            <p>Espace Partenaires — Passer une commande de stock</p>
        </header>

        <section class="form-section">
            <h3>Passer une commande</h3>
            <form id="orderForm">
                <div class="input-group">
                    <label for="orderItem">Article souhaité</label>
                    <select id="orderItem" required>
                    </select>
                </div>

                <div class="input-group">
                    <label for="orderQuantity">Quantité</label>
                    <input type="number" id="orderQuantity" min="1" value="10" required>
                </div>

                <button type="submit">Envoyer la commande au Lucky Plucker</button>
            </form>
        </section>

        <section class="history-section">
            <h3>Nos Commandes Récentes</h3>
            <table>
                <thead>
                    <tr>
                        <th>Article</th>
                        <th>Quantité</th>
                        <th>Statut</th>
                    </tr>
                </thead>
                <tbody id="ordersList">
                    <tr>
                        <td>Bouteille de Champagne</td>
                        <td>20</td>
                        <td><span style="color: #ffaa00;">En attente de livraison</span></td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>

<script>
// ====== INJECTION STYLE ORANGE & ADAPTATION DU NOM ======
function appliquerThemeEtNom() {
    // Remplacement des mentions textuelles "Tropical Heights" par "Lucky Plucker" au cas où
    const headerTitle = document.querySelector('header h2');
    if (headerTitle) headerTitle.textContent = "Lucky Plucker";

    const subTextPage = document.querySelector('header p');
    if (subTextPage && subTextPage.textContent.includes("Tropical Heights")) {
        subTextPage.textContent = subTextPage.textContent.replace("Tropical Heights", "Lucky Plucker");
    }

    if (document.title.includes("Tropical Heights")) {
        document.title = document.title.replace("Tropical Heights", "Lucky Plucker");
    }

    // Injection dynamique des styles Orange / Ambre
    let styleOrange = document.getElementById('theme-orange-style');
    if (!styleOrange) {
        styleOrange = document.createElement('style');
        styleOrange.id = 'theme-orange-style';
        styleOrange.innerHTML = `
            /* Couleurs des textes principaux et labels */
            header h2, h3, label, th, td { color: #ff9f43 !important; }
            
            /* Inputs et listes déroulantes */
            input, select { 
                background: #09121a !important; 
                color: #fff !important; 
                border: 1px solid #1f3141 !important; 
            }
            input:focus, select:focus { 
                border-color: #ff9f43 !important; 
                outline: none;
            }

            /* Bouton d'ajout classique */
            button[type="submit"], #orderForm button { 
                background: linear-gradient(90deg, #ff9f43 0%, #ff7675 100%) !important; 
                color: #0b131a !important; 
                border: none !important;
                font-weight: bold;
                text-transform: uppercase;
                cursor: pointer;
            }
            
            button[type="submit"]:hover, #orderForm button:hover {
                background: linear-gradient(90deg, #ffb167 0%, #ff8a88 100%) !important;
            }
        `;
        document.head.appendChild(styleOrange);
    }
}

// Lancement automatique du thème
appliquerThemeEtNom();

// ====== LOGIQUE DU PANIER ET DES COMMANDES ======
const enseigne = "Lucky Plucker";
let panier = [];
const entrepriseNom = localStorage.getItem('entrepriseConnectee') || "Entreprise Partenaire";

function chargerCartePourClients() {
    const articles = JSON.parse(localStorage.getItem('articlesBoutique')) || [];
    const select = document.getElementById('orderItem');
    if(!select) return;
    
    select.innerHTML = '<option value="">-- Choisir un produit --</option>';
    articles.forEach(article => {
        const option = document.createElement('option');
        option.value = article.nom;
        option.textContent = `${article.nom} (${article.prix}$)`;
        select.appendChild(option);
    });
}

document.getElementById('orderForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const item = document.getElementById('orderItem').value;
    const qty = parseInt(document.getElementById('orderQuantity').value);
    
    if(!item || isNaN(qty) || qty <= 0) {
        alert("Veuillez sélectionner un article valide !");
        return;
    }
    
    const indexExiste = panier.findIndex(p => p.article === item);
    if(indexExiste > -1) {
        panier[indexExiste].quantite += qty;
    } else {
        panier.push({ article: item, quantite: qty });
    }
    
    afficherMonPanierCourant();
    document.getElementById('orderForm').reset();
});

function afficherMonPanierCourant() {
    const tbody = document.getElementById('ordersList');
    if(!tbody) return;
    tbody.innerHTML = '';
    
    if(panier.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#a5b1c2;">Votre panier est vide</td></tr>';
        return;
    }
    
    panier.forEach((p, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td style="color: #fff !important;">🛒 ${p.article}</td>
            <td style="color: #fff !important;">${p.quantite}</td>
            <td><button onclick="retirerDuPanier(${index})" style="background:#fc5c65; color:white; border:none; padding:3px 8px; border-radius:4px; cursor:pointer;">Enlever</button></td>
        `;
        tbody.appendChild(row);
    });
    
    const rowValidation = document.createElement('tr');
    rowValidation.innerHTML = `
        <td colspan="3" style="text-align:center; padding-top: 15px;">
            <button onclick="validerLeTicketFinal()" style="background: linear-gradient(90deg, #ff9f43 0%, #ff7675 100%) !important; color: #09121a; border:none; padding:10px 20px; border-radius:6px; font-weight:bold; cursor:pointer; width:100%; text-transform:uppercase;">
                🚀 Envoyer la commande au ${enseigne}
            </button>
        </td>
    `;
    tbody.appendChild(rowValidation);
}

window.retirerDuPanier = function(index) {
    panier.splice(index, 1);
    afficherMonPanierCourant();
};

window.validerLeTicketFinal = function() {
    if(panier.length === 0) return;
    
    let commandesGlobales = JSON.parse(localStorage.getItem('commandesGlobales')) || [];
    const dateActuelle = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    
    commandesGlobales.push({
        id: Date.now(),
        heure: dateActuelle,
        entreprise: entrepriseNom,
        details: [...panier],
        statut: "Attente Paiement"
    });
    
    localStorage.setItem('commandesGlobales', JSON.stringify(commandesGlobales));
    
    alert("Votre commande groupée a bien été transmise !");
    panier = [];
    afficherMonPanierCourant();
    
    const tbody = document.getElementById('ordersList');
    if(tbody) tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#ff9f43; font-weight:bold;">✅ Commande envoyée avec succès !</td></tr>';
};

chargerCartePourClients();
afficherMonPanierCourant();
</script>
</body>
</html>
