<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropical Heights - Panel Admin & Gestion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #0f1a24; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #fff; padding: 20px;">

    <div id="panel-suivi-employes" class="admin-container" style="max-width: 1000px; margin: 0 auto;">
        
        <h1 style="text-align: center; color: #00ffcc; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px;">
            Tropical Heights - Espace Boss
        </h1>

        <div style="background: #1c2d42; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 25px; border: 1px solid #34495e; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
            <h3 style="margin: 0; color: #85929e; text-transform: uppercase; font-size: 14px; letter-spacing: 1px;">Chiffre d'Affaires Global</h3>
            <div id="ca-total" style="font-size: 36px; color: #00ffcc; font-weight: bold; margin-top: 10px;">0 $</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr; gap: 25px;">
            
            <div style="background: #1c2d42; padding: 20px; border-radius: 8px; border: 1px solid #34495e;">
                <h2 style="color: #fff; margin-top: 0; margin-bottom: 15px; font-size: 18px; border-bottom: 2px solid #34495e; padding-bottom: 8px;">
                    Performances de l'Équipe
                </h2>
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; color: #fff;">
                        <thead>
                            <tr style="background: #2c3e50;">
                                <th style="padding: 12px; border: 1px solid #34495e; text-align: left;">Employé</th>
                                <th style="padding: 12px; border: 1px solid #34495e; text-align: center;">Ventes Totales</th>
                                <th style="padding: 12px; border: 1px solid #34495e; text-align: right;">Chiffre d'Affaires</th>
                            </tr>
                        </thead>
                        <tbody id="corps-tableau-ca">
                            </tbody>
                    </table>
                </div>
            </div>

            <div style="background: #1c2d42; padding: 20px; border-radius: 8px; border: 1px solid #34495e;">
                <h2 style="color: #fff; margin-top: 0; margin-bottom: 15px; font-size: 18px; border-bottom: 2px solid #34495e; padding-bottom: 8px;">
                    Gestion des Accès (Créer un compte)
                </h2>
                <form id="registerForm" style="display: flex; flex-direction: column; gap: 15px; margin-top: 15px;">
                    <div>
                        <label style="display: block; margin-bottom: 5px; color: #a5b1c2; font-size: 14px;">Identifiant du nouvel employé :</label>
                        <input type="text" id="newUsername" placeholder="Ex: Employe2" required style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #34495e; background: #0f1a24; color: #fff; box-sizing: border-box;">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 5px; color: #a5b1c2; font-size: 14px;">Mot de passe :</label>
                        <input type="password" id="newPassword" placeholder="••••••••" required style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #34495e; background: #0f1a24; color: #fff; box-sizing: border-box;">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 5px; color: #a5b1c2; font-size: 14px;">Rôle / Niveau d'accès :</label>
                        <select id="newRole" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #34495e; background: #0f1a24; color: #fff; box-sizing: border-box;">
                            <option value="employe">Employé (Accès Ventes uniquement)</option>
                            <option value="admin">Admin / Boss (Accès Total)</option>
                        </select>
                    </div>
                    <button type="submit" style="background: #00ffcc; color: #0f1a24; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 15px; transition: background 0.2s;">
                        Créer le compte et accorder les accès
                    </button>
                </form>
            </div>

            <div style="background: #1c2d42; padding: 20px; border-radius: 8px; border: 1px solid #34495e;">
                <h2 style="color: #fff; margin-top: 0; margin-bottom: 15px; font-size: 18px; border-bottom: 2px solid #34495e; padding-bottom: 8px;">
                    Journal des Ventes (En direct)
                </h2>
                <div id="archives-globales" style="max-height: 220px; overflow-y: auto; background: #0f1a24; padding: 15px; border-radius: 6px; border: 1px solid #2c3e50;">
                    <p style="color: #666; margin: 0;">Aucun historique enregistré pour le moment.</p>
                </div>
            </div>

        </div>

        <div style="text-align: center; margin-top: 30px; display: flex; justify-content: center; gap: 15px;">
            <button onclick="window.remiseAZeroFiches()" style="background: #e74c3c; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-weight: bold;">
                Remettre à zéro les fiches employés
            </button>
            <a href="index.html" style="background: #7f8c8d; color: white; text-decoration: none; padding: 12px 24px; border-radius: 5px; font-weight: bold; display: inline-block;">
                Déconnexion
            </a>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
