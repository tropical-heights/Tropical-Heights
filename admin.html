<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropical Heights - Panel Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="panel-suivi-employes" class="admin-container" style="padding: 20px; max-width: 1000px; margin: 0 auto;">
        
        <h1 style="color: #fff; text-align: center; margin-bottom: 30px;">Tropical Heights - Espace Boss</h1>

        <div style="background: #1c2d42; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 25px; border: 1px solid #34495e;">
            <h3 style="margin: 0; color: #85929e;">Chiffre d'Affaires Global</h3>
            <div id="ca-total" style="font-size: 32px; color: #00ffcc; font-weight: bold; margin-top: 10px;">0 $</div>
        </div>

        <div style="background: #1c2d42; padding: 20px; border-radius: 8px; border: 1px solid #34495e; margin-bottom: 25px;">
            <h2 style="color: #fff; margin-top: 0; margin-bottom: 15px;">Performances de l'Équipe</h2>
            <table style="width: 100%; border-collapse: collapse; color: #fff;">
                <thead>
                    <tr style="background: #2c3e50;">
                        <th style="padding: 12px; border: 1px solid #34495e; text-align: left;">Employé</th>
                        <th style="padding: 12px; border: 1px solid #34495e; text-align: center;">Ventes Totales</th>
                        <th style="padding: 12px; border: 1px solid #34495e; text-align: right;">Chiffre d'Affaires</th>
                    </tr>
                </thead>
                <tbody id="corps-tableau-ca">
                    </tbody>
            </table>
        </div>

        <div style="background: #1c2d42; padding: 20px; border-radius: 8px; border: 1px solid #34495e; margin-bottom: 25px;">
            <h2 style="color: #fff; margin-top: 0; margin-bottom: 15px;">Journal des Ventes (En direct)</h2>
            <div id="archives-globales" style="max-height: 200px; overflow-y: auto; background: #0f1a24; padding: 15px; border-radius: 6px; border: 1px solid #2c3e50;">
                <p style="color: #666; margin: 0;">Aucun historique enregistré pour le moment.</p>
            </div>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <button onclick="window.remiseAZeroFiches()" style="background: #e74c3c; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 10px;">
                Remettre à zéro les fiches employés
            </button>
            <a href="index.html" style="background: #7f8c8d; color: white; text-decoration: none; padding: 12px 24px; border-radius: 5px; font-weight: bold; display: inline-block;">
                Déconnexion
            </a>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
